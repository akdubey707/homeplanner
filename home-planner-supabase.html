<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-visual"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#06080e"/>
<title>🏡 HomePlanner Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:#06080e;font-family:'DM Mono',monospace;color:#dce8f5;display:flex;flex-direction:column}
#root{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
/* Scrollbars */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#182030;border-radius:4px}
/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes toastIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.fadeup{animation:fadeUp .25s ease}
.slider{animation:slideRight .2s ease}
.pulse{animation:pulse 1.4s infinite}
.spin{animation:spin .8s linear infinite}
.toast-item{animation:toastIn .2s ease}
/* Touch */
button,a,select{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
/* Hover — desktop only */
@media(hover:hover){
  .hrow:hover{background:var(--faint)!important}
  .sbtn:hover{background:var(--faint)!important}
  .nav-btn:hover{opacity:.8}
  .cal-day:hover{background:var(--faint)}
}
.nav-btn{transition:all .15s}
/* Inputs — font-size 16px prevents iOS zoom, but only on mobile */
input,select,textarea{
  font-family:'DM Mono',monospace;
  -webkit-user-select:text;user-select:text;
  touch-action:manipulation;
}
input:focus,select:focus,textarea:focus{outline:none}
/* Modal */
.modal-overlay{
  position:fixed;inset:0;background:#000d;z-index:300;
  display:flex;align-items:flex-start;justify-content:center;
  padding:16px;overflow-y:auto;
  -webkit-overflow-scrolling:touch;overscroll-behavior:contain;
}
.modal-box{
  background:var(--card2);border-radius:16px;padding:24px;
  width:100%;max-width:520px;margin:auto;position:relative;
  transform:translateZ(0);will-change:transform;
}
.modal-box-wide{max-width:680px}
/* Bottom safe area */
.bottom-safe{padding-bottom:env(safe-area-inset-bottom,0px)}
/* Tab bar */
.tab-bar{
  display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;border-bottom:1px solid var(--border);
  background:var(--card);flex-shrink:0;
}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{
  flex-shrink:0;padding:0 14px;height:44px;border:none;
  border-bottom:2px solid transparent;background:transparent;
  color:var(--muted);font-size:12px;cursor:pointer;white-space:nowrap;
  font-family:'DM Mono',monospace;transition:color .15s,border-color .15s;
}
.tab-btn.active{color:var(--text);border-bottom-color:var(--accent)}
/* Content area */
.content-area{flex:1;overflow:hidden;min-height:0;display:flex;flex-direction:column}
/* ── SPLIT LAYOUT ── */
.split-layout{display:flex;flex:1;min-height:0;overflow:hidden}
/* Desktop sidebar */
.sidebar{
  width:190px;min-width:190px;flex-shrink:0;
  background:var(--card);border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.sidebar-inner{
  flex:1;display:flex;flex-direction:column;
  padding:12px 8px 8px;gap:2px;overflow-y:auto;min-height:0;
}
.sidebar-footer{
  flex-shrink:0;padding:10px 12px;
  border-top:1px solid var(--border);
  background:var(--card);
}
.sidebar-btn{
  width:100%;text-align:left;background:transparent;
  border:none;border-left:3px solid transparent;
  border-radius:0 6px 6px 0;padding:9px 10px;
  cursor:pointer;font-size:11px;color:var(--muted);
  font-family:'DM Mono',monospace;transition:all .15s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  flex-shrink:0;display:block;
}
.sidebar-btn:hover{background:var(--faint);color:var(--text)}
.sidebar-btn.active{background:var(--faint);color:var(--text);border-left-color:var(--accent);font-weight:700;}
.main-panel{flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch;min-height:0;}
/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px}
/* Stat cards row */
.stat-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.stat-card{background:var(--card);border-radius:12px;padding:13px 15px;flex:1;min-width:110px}
/* Form row */
.form-row{display:flex;gap:12px}
.form-row>*{flex:1}
/* Input */
.inp{width:100%;background:var(--faint);border:1.5px solid var(--border);border-radius:8px;color:var(--text);padding:10px 12px;font-size:14px;font-family:'DM Mono',monospace;-webkit-appearance:none;transition:border-color .15s}
.inp:focus{border-color:var(--accent)}
select.inp{cursor:pointer}
textarea.inp{resize:vertical;min-height:70px}
/* Pill */
.pill{display:inline-flex;align-items:center;border-radius:99px;padding:2px 9px;font-size:10px;font-weight:700;letter-spacing:.4px;white-space:nowrap}
/* Table rows */
.trow{display:grid;align-items:center;padding:11px 14px;transition:background .15s}
.trow:not(:last-child){border-bottom:1px solid var(--border)}
/* Empty state */
.empty-state{border:2px dashed var(--border);border-radius:14px;padding:40px;text-align:center;color:var(--muted)}
/* Settings */
.settings-section{border-bottom:1px solid var(--border);padding-bottom:20px;margin-bottom:20px}
.settings-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
/* Login */
.login-wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px;overflow-y:auto}
.login-card{width:100%;max-width:400px;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:32px}
/* Avatar */
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0}
/* Drag */
.drag-item{cursor:grab;transition:opacity .15s,transform .15s}
.drag-item:active{cursor:grabbing}
.drag-item.dragging{opacity:.4;transform:scale(.97)}
.drag-over{border-top:2px solid var(--accent)!important}
/* Calendar */
.cal-day{border-radius:8px;padding:6px 4px;min-height:52px;cursor:pointer;transition:background .15s;position:relative}
.cal-day.today{background:var(--accent)22;border:1.5px solid var(--accent)}
.cal-day.other-month{opacity:.35}
.cal-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin:1px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
/* Swipe hint */
.swipe-hint{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#000a;color:#fff8;border-radius:20px;padding:6px 16px;font-size:11px;pointer-events:none;opacity:0;transition:opacity .3s;z-index:150}
.swipe-hint.show{opacity:1}
/* Camera button */
.cam-btn{position:absolute;bottom:8px;right:8px;background:var(--accent);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:#03080f}
/* Photo thumb */
.photo-thumb{width:40px;height:40px;border-radius:6px;object-fit:cover;cursor:pointer;border:1px solid var(--border)}
/* Doc status */
.doc-status{border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer}
/* Key date card */
.kd-card{border-left:3px solid;border-radius:8px;padding:11px 14px;margin-bottom:8px;background:var(--faint)}
/* Commute card */
.commute-card{border-radius:12px;padding:14px 16px;background:var(--card);border:1px solid var(--border)}
/* Sqft bar */
.sqft-bar{height:6px;border-radius:3px;background:var(--faint);overflow:hidden;margin-top:4px}
.sqft-fill{height:100%;border-radius:3px;transition:width .5s}
/* Spinner */
.spinner{width:18px;height:18px;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;display:inline-block}
/* Item table — desktop grid, mobile card */
.item-table-header{display:grid}
.item-row-mobile{display:none}
/* ── MOBILE OVERRIDES (≤640px) ── */
@media(max-width:640px){
  /* Inputs — prevent iOS zoom */
  input,select,textarea{font-size:16px!important}
  .inp{font-size:16px!important}
  /* Modal */
  .modal-overlay{padding:8px;align-items:flex-end}
  .modal-box{padding:18px 14px;border-radius:16px 16px 0 0;max-width:100%;margin:0}
  .modal-box-wide{max-width:100%}
  /* Login */
  .login-wrap{align-items:flex-start;padding:12px}
  .login-card{padding:20px 16px;border-radius:14px}
  /* Split layout — horizontal pills on mobile */
  .content-area{overflow-y:auto;-webkit-overflow-scrolling:touch;display:block}
  .split-layout{flex-direction:column;overflow:visible;height:auto}
  .sidebar{
    width:100%;min-width:unset;height:auto;
    flex-direction:row;border-right:none;
    border-bottom:1px solid var(--border);
    overflow-x:auto;overflow-y:hidden;flex-shrink:0;
  }
  .sidebar::-webkit-scrollbar{display:none}
  .sidebar-inner{
    flex:unset;flex-direction:row;align-items:center;
    padding:8px 10px;gap:6px;min-width:max-content;
    overflow-y:visible;min-height:unset;
  }
  .sidebar-footer{display:none}
  .sidebar-btn{
    flex-shrink:0;white-space:nowrap;overflow:visible;
    border:1px solid var(--border);border-left:1px solid var(--border);
    border-radius:20px;padding:6px 13px;
    width:auto;text-align:center;
  }
  .sidebar-btn.active{
    background:var(--accent);color:#03080f;
    border-color:var(--accent);border-left-color:var(--accent);
  }
  .main-panel{padding:12px;overflow-y:visible;}
  /* Cards */
  .card{padding:14px}
  .stat-card{min-width:90px;padding:10px 11px}
  /* Item rows — card style on mobile */
  .item-table-header{display:none}
  .item-row-mobile{display:flex;flex-direction:column;padding:10px 12px;border-bottom:1px solid var(--border);gap:4px}
  /* Tab bar */
  .tab-btn{padding:0 10px;height:40px;font-size:11px}
  /* Calendar */
  .cal-day{min-height:38px;padding:3px 2px}
  .cal-dot{width:4px;height:4px}
  /* Empty state */
  .empty-state{padding:28px 16px}
}
</style>
</head>

<script type="text/babel">
const {useState,useMemo,useEffect,useCallback,useRef,Fragment}=React;

// ═══════════════════════════════════════════════

// ═══════════════════════════════════════════════

// ═══════════════════════════════════════════════
const ACCENTS=[

const mkTheme=(dark,accent)=>({
  bg:dark?"#06080e":"#f0f4f8", card:dark?"#0b0f19":"#ffffff",
  card2:dark?"#0f1520":"#f8fafc", border:dark?"#182030":"#dde6f0",
  faint:dark?"#0f1520":"#eef3f8", text:dark?"#dce8f5":"#0f1a2a",
  muted:dark?"#405570":"#7090b0",
  accent, gold:"#f0a500", green:"#2ecc8a", red:"#ff5f5f",
  purple:"#9b72f5", orange:"#ff8c42", pink:"#f06292",
  teal:"#26c6b0", vastu:"#fbbf24", lime:"#a3e635",
});
const applyTheme=C=>{
  const r=document.documentElement.style;
  Object.entries({
    '--bg':C.bg,'--card':C.card,'--card2':C.card2,
    '--border':C.border,'--faint':C.faint,'--text':C.text,
    '--muted':C.muted,'--accent':C.accent,
  }).forEach(([k,v])=>r.setProperty(k,v));
  document.body.style.background=C.bg;
  document.body.style.color=C.text;
  document.querySelector('meta[name="theme-color"]')?.setAttribute('content',C.bg);
};

// ═══════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════
const LOAN_TYPES=["Home Loan","Top-Up Loan","LAP Loan","Personal Loan","Vehicle Loan","Other"];
const RATE_TYPES=["Reducing Balance","Flat Rate"];

  "Kitchen":["Ideal in South-East (Agni corner)","Cook facing East for prosperity","Avoid North-East placement"],

  "Bathroom":["North-West or West is good","Avoid North-East bathroom","Drainage towards North or East"],
  "Study / Home Office":["North or East facing best","Sit facing North or East","Avoid sitting under a beam"],
  "Dining Room":["West direction is ideal","Rectangular table preferred","Avoid dining under a beam"],
};
const SMART_PRESETS=[
  {name:"Smart LED Bulbs (set of 10)",category:"Lighting",brand:"Philips Hue / Syska",cost:8000,protocol:"Wi-Fi",notes:"Works with Alexa & Google Home"},
  {name:"Smart Switch (4-gang)",category:"Lighting",brand:"Anchor / Wipro",cost:3500,protocol:"Wi-Fi",notes:"Replace existing switches"},

  {name:"Smart Door Lock",category:"Security",brand:"Yale / Godrej",cost:15000,protocol:"Bluetooth+Wi-Fi",notes:"Fingerprint + PIN + App"},
  {name:"CCTV (4 cameras + DVR)",category:"Security",brand:"Hikvision",cost:18000,protocol:"Wired",notes:"2MP, night vision, 1TB"},
  {name:"Smart AC Controller",category:"Climate",brand:"Sensibo / Cielo",cost:5000,protocol:"Wi-Fi",notes:"Works with split ACs"},

const REC_SUGGS=[
  {name:"Society Maintenance",icon:"🏘️",category:"Society"},
  {name:"Solar Panel AMC",icon:"☀️",category:"Energy"},
  {name:"Garden Maintenance",icon:"🌿",category:"Outdoor"},
  {name:"Security Staff",icon:"🔐",category:"Security"},
  {name:"Electricity Bill",icon:"⚡",category:"Utilities"},
  {name:"Piped Gas",icon:"🔥",category:"Utilities"},
  {name:"Water Charges",icon:"💧",category:"Utilities"},
  {name:"Internet / Broadband",icon:"📡",category:"Tech"},
  {name:"Lift Maintenance AMC",icon:"🛗",category:"Society"},
  {name:"Home Insurance",icon:"🛡️",category:"Insurance"},
  {name:"Housekeeping",icon:"🧹",category:"Household"},
  {name:"Property Tax",icon:"🏛️",category:"Tax"},
];

const TABS=[
  {id:"plan",label:"🏗 Plan"},
  {id:"rooms",label:"🏠 Rooms"},
  {id:"gallery",label:"📸 Gallery"},
  {id:"floorplan",label:"📐 Floor Plan"},
  {id:"vastu",label:"🧭 Vastu"},
  {id:"snag",label:"🔴 Snag List"},
  {id:"budget",label:"💰 Budget vs Actual"},
  {id:"payment",label:"🏦 Payments"},
  {id:"cashflow",label:"📅 Cashflow"},
  {id:"moodboard",label:"🎨 Moodboard"},
  {id:"utility",label:"💡 Utilities"},
  {id:"smart",label:"⚡ Smart"},
  {id:"amc",label:"🔧 AMC"},
  {id:"loans",label:"🏦 Loans"},
  {id:"recurring",label:"🔁 Monthly"},
  {id:"neighbourhood",label:"🌏 Area"},
  {id:"contractors",label:"👷 Contractors"},
  {id:"calendar",label:"🗓 Calendar"},
  {id:"docs",label:"📋 Documents"},
  {id:"dashboard",label:"📊 Dashboard"},
  {id:"settings",label:"⚙️ Settings"},
];
const TAB_IDS=["plan","rooms","gallery","floorplan","vastu","snag","budget","payment","cashflow","moodboard","utility","smart","amc","loans","recurring","neighbourhood","contractors","calendar","docs","dashboard","settings"];

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
let _id=5000;
const lid=()=>++_id;
const fmt=n=>{if(n==null||n===""||isNaN(n))return"—";return"₹"+Number(n).toLocaleString("en-IN")};
const fmtK=n=>{if(!n)return"—";if(n>=1e7)return"₹"+(n/1e7).toFixed(2)+" Cr";if(n>=1e5)return"₹"+(n/1e5).toFixed(1)+" L";return fmt(n)};
const fmtSq=n=>n?n+" sq ft":"—";
const calcEMI=(p,r,t,rt)=>{if(!p||!r||!t)return 0;if(rt==="Flat Rate")return Math.round((p+p*(r/100)*t)/(t*12));const m=r/12/100,n=t*12;return Math.round(p*m*Math.pow(1+m,n)/(Math.pow(1+m,n)-1))};
const toMo=r=>{const a=Number(r.amount)||0;return r.frequency==="Monthly"?a:r.frequency==="Quarterly"?a/3:r.frequency==="Half-yearly"?a/6:a/12};
const daysTo=d=>{if(!d)return null;return Math.ceil((new Date(d)-new Date())/864e5)};
const expC=(d,C)=>d==null?"":d<0?C.red:d<30?C.orange:d<90?C.gold:C.green;
const expL=d=>d==null?"No date":d<0?`Expired ${Math.abs(d)}d ago`:d===0?"Today!":d===1?"Tomorrow":`${d}d left`;
const deepClone=o=>JSON.parse(JSON.stringify(o));

// Password utility (kept for potential hashing use)
// ─────────────────────────────────────────────────────
// localStorage helpers
const LS={
  get:(k,def=null)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):def}catch{return def}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}},
  del:(k)=>{try{localStorage.removeItem(k)}catch{}},
};

// Cache keys
const CK={
  setup:"hp_sb_setup",      // {url, anonKey}
  session:"hp_sb_session",  // {userId, username, fullName, avatarColor, token}
  settings:"hp_sb_settings",
  cache:(uid)=>`hp_sb_cache_${uid}`,
};

// WhatsApp summary
const makeWA=(data)=>{
  const {profile,sections,loans,recurring,rooms,smartDevs,amcItems,amenities}=data;
  const grandTotal=sections.reduce((a,s)=>a+(s.items||[]).reduce((b,i)=>b+(Number(i.cost)||0)*(Number(i.qty)||1),0),0);
  const smartTotal=smartDevs.reduce((a,d)=>a+(Number(d.cost)||0),0);
  const totalEMI=loans.reduce((a,l)=>a+calcEMI(Number(l.amount),Number(l.rate),Number(l.tenure),l.rateType||l.rate_type),0);
  const totalRec=recurring.reduce((a,r)=>a+toMo(r),0);
  return`🏡 *HomePlanner Summary*\n📍 ${profile.city} | 👨‍👩‍👧 ${profile.family||"—"} | 🗓 ${profile.timeline||"—"}\n\n💰 *Budget:* ${fmtK(Number(profile.budget)||0)}\n🏗 *One-Time Total:* ${fmtK(grandTotal+smartTotal)}\n\n📅 *Monthly Burden:* ${fmt(totalEMI+totalRec)}\n  • EMIs: ${fmt(totalEMI)} (${loans.length} loan${loans.length!==1?"s":""})\n  • Recurring: ${fmt(totalRec)}\n\n🏠 *Rooms:* ${rooms.length} | ${rooms.reduce((a,r)=>a+(Number(r.sqft)||0),0)} sq ft\n📍 *Amenities:* ${amenities.length}\n🔧 *AMC items:* ${amcItems.length}\n\n_HomePlanner v${APP_VER}_`;
};

const parseCSV=text=>{
  const lines=text.trim().split("\n");if(lines.length<2)return[];
  const headers=lines[0].split(",").map(h=>h.trim().replace(/"/g,"").toLowerCase());
  return lines.slice(1).map(line=>{const vals=line.split(",").map(v=>v.trim().replace(/"/g,""));const obj={};headers.forEach((h,i)=>obj[h]=vals[i]||"");return obj;});
};

// ═══════════════════════════════════════════════
// POCKETBASE CLIENT
// ═══════════════════════════════════════════════
// ═══════════════════════════════════════════════
// SUPABASE CLIENT (Self-Hosted)
// Uses PostgREST REST API + GoTrue Auth
// Schema: homeplanner (all tables in this schema)
// ═══════════════════════════════════════════════
const mkDB=(url,anonKey,userToken="")=>{
  const SCHEMA = "homeplanner";
  const base   = `${url}/rest/v1`;
  const auth   = `${url}/auth/v1`;

  const H=(withToken=true)=>{
    const tok = userToken || anonKey;
    return{
      "Content-Type":"application/json",
      "apikey": anonKey,
      "Authorization": `Bearer ${tok}`,
      "Accept-Profile": SCHEMA,
      "Content-Profile": SCHEMA,
    };
  };

  return{
    _url: url,
    _anonKey: anonKey,
    _userToken: userToken,
    setToken(tok){ userToken=tok; },

    // ── CRUD ────────────────────────────────────
    async get(t,qs=""){
      try{
        const r=await fetch(`${base}/${t}${qs}`,{headers:H()});
        if(!r.ok){console.error("GET",t,r.status,await r.text().catch(()=>""));return[];}
        return r.json();
      }catch(e){console.error("GET exception",t,e);return[];}
    },

    async post(t,body){
      try{
        const r=await fetch(`${base}/${t}`,{
          method:"POST",
          headers:{...H(),Prefer:"return=representation"},
          body:JSON.stringify(body),
        });
        if(!r.ok){console.error("POST",t,r.status,await r.text().catch(()=>""));return null;}
        const d=await r.json();
        return Array.isArray(d)?d[0]:d;
      }catch(e){console.error("POST exception",t,e);return null;}
    },

    async patch(t,id,body){
      try{
        const r=await fetch(`${base}/${t}?id=eq.${id}`,{
          method:"PATCH",
          headers:{...H(),Prefer:"return=minimal"},
          body:JSON.stringify(body),
        });
        if(!r.ok) console.error("PATCH",t,r.status,await r.text().catch(()=>""));
      }catch(e){console.error("PATCH exception",t,e);}
    },

    async del(t,id){
      try{
        const r=await fetch(`${base}/${t}?id=eq.${id}`,{method:"DELETE",headers:H()});
        if(!r.ok) console.error("DEL",t,r.status);
      }catch(e){console.error("DEL exception",t,e);}
    },

    // ── AUTH ─────────────────────────────────────
    async authWithPassword(email,password){
      try{
        const r=await fetch(`${auth}/token?grant_type=password`,{
          method:"POST",
          headers:{"Content-Type":"application/json","apikey":anonKey},
          body:JSON.stringify({email,password}),
        });
        if(!r.ok){
          const e=await r.json().catch(()=>({}));
          return{error:e?.error_description||e?.msg||"Invalid credentials"};
        }
        const d=await r.json();
        userToken=d.access_token;
        return{
          token:d.access_token,
          record:{
            id:d.user?.id,
            email:d.user?.email,
            name:d.user?.user_metadata?.full_name||d.user?.email,
            username:d.user?.user_metadata?.username||d.user?.email?.split("@")[0],
            avatar_color:d.user?.user_metadata?.avatar_color||"#38bdf8",
          }
        };
      }catch(e){return{error:e.message};}
    },

    async registerUser(email,password,username,fullName){
      try{
        const avatarColor=["#38bdf8","#34d399","#fbbf24","#fb7185","#a78bfa"][Math.floor(Math.random()*5)];
        const r=await fetch(`${auth}/signup`,{
          method:"POST",
          headers:{"Content-Type":"application/json","apikey":anonKey},
          body:JSON.stringify({
            email,password,
            data:{full_name:fullName,username:username||email.split("@")[0],avatar_color:avatarColor},
          }),
        });
        if(!r.ok){const e=await r.json().catch(()=>({}));return{error:e?.error_description||e?.msg||"Registration failed"};}
        const d=await r.json();
        return{
          record:{
            id:d.id||d.user?.id,
            email:d.email||d.user?.email,
            name:fullName,
            username:username||email.split("@")[0],
            avatar_color:avatarColor,
          }
        };
      }catch(e){return{error:e.message};}
    },

    async changePwd(newPassword){
      try{
        const r=await fetch(`${auth}/user`,{
          method:"PUT",
          headers:{"Content-Type":"application/json","apikey":anonKey,"Authorization":`Bearer ${userToken}`},
          body:JSON.stringify({password:newPassword}),
        });
        if(!r.ok){const e=await r.json().catch(()=>({}));return{error:e?.msg||"Password change failed"};}
        return{ok:true};
      }catch(e){return{error:e.message};}
    },

    async testConn(){
      try{
        // Test both REST and auth endpoints
        const r=await fetch(`${base}/profiles?limit=0`,{
          headers:{
            "Content-Type":"application/json",
            "apikey":anonKey,
            "Authorization":`Bearer ${anonKey}`,
            "Accept-Profile":SCHEMA,
          },
          signal:AbortSignal.timeout(6000),
        });
        return r.ok||r.status===200||r.status===406;
      }catch(e){return false;}
    },

    async testConnDetail(){
      const result={rest:false,auth:false,schema:false,latency:null,errors:[]};
      const t0=Date.now();
      try{
        // 1. Test REST endpoint
        const r1=await fetch(`${url}/rest/v1/`,{
          headers:{"apikey":anonKey,"Authorization":`Bearer ${anonKey}`},
          signal:AbortSignal.timeout(6000),
        });
        result.rest=r1.ok||r1.status===200;
        if(!result.rest) result.errors.push(`REST: HTTP ${r1.status}`);

        // 2. Test Auth endpoint
        const r2=await fetch(`${auth}/settings`,{
          headers:{"apikey":anonKey},
          signal:AbortSignal.timeout(5000),
        });
        result.auth=r2.ok;
        if(!result.auth) result.errors.push(`Auth: HTTP ${r2.status}`);

        // 3. Test schema
        const r3=await fetch(`${base}/profiles?limit=0`,{
          headers:{"apikey":anonKey,"Authorization":`Bearer ${anonKey}`,"Accept-Profile":SCHEMA,"Content-Profile":SCHEMA},
          signal:AbortSignal.timeout(5000),
        });
        result.schema=r3.ok||r3.status===200||r3.status===406;
        if(!result.schema) result.errors.push(`Schema '${SCHEMA}': HTTP ${r3.status} — run SQL setup`);

        result.latency=Date.now()-t0;
      }catch(e){
        result.errors.push(e.name==="TimeoutError"?"Timeout — Supabase unreachable":`${e.message}`);
      }
      return result;
    },
  };
};

const Pill=({label,color,sm})=>(

// Mobile-safe input: scrolls into view on focus to prevent keyboard hiding it
// ── Stable input styles using CSS vars (no C prop = no re-render on theme change) ──
const INP_STYLE={
  background:"var(--faint)",
  border:"1.5px solid var(--border)",
  borderRadius:8,
  color:"var(--text)",
  padding:"10px 12px",
  fontSize:14,
  fontFamily:"'DM Mono',monospace",
  width:"100%",
  WebkitAppearance:"none",
  transition:"border-color .15s",
};

// React.memo prevents re-render unless value/placeholder/type actually changes
const Inp=React.memo(({value,onChange,placeholder,type="text",disabled,rows,C,id:inputId})=>{
  const ref=useRef(null);
  const handleChange=useCallback(e=>onChange(e.target.value),[onChange]);
  const onFocus=useCallback(()=>{
    setTimeout(()=>ref.current?.scrollIntoView({behavior:"smooth",block:"center"}),350);
  },[]);
  if(rows) return(
    <textarea ref={ref} id={inputId} value={value||""} onChange={handleChange}
      placeholder={placeholder} rows={rows} disabled={disabled} onFocus={onFocus}
      style={{...INP_STYLE,resize:"vertical"}}/>
  );
  return(
    <input ref={ref} id={inputId} type={type} value={value||""} onChange={handleChange}
      placeholder={placeholder} disabled={disabled} onFocus={onFocus}
      style={INP_STYLE} autoComplete="off" autoCorrect="off" spellCheck="false"/>
  );
});

const Sel=React.memo(({value,onChange,opts,C,id:selId})=>{
  const handleChange=useCallback(e=>onChange(e.target.value),[onChange]);
  return(
    <select id={selId} value={value} onChange={handleChange}
      style={{...INP_STYLE,cursor:"pointer"}}>
      {opts.map(o=><option key={o.v??o} value={o.v??o}>{o.l??o}</option>)}
    </select>
  );
});

// SETUP SCREEN (first-time, one-time)
// ═══════════════════════════════════════════════
function SetupScreen({onDone}){
  const C=mkTheme(true,"#38bdf8");
  const [url,setUrl]=useState(DEFAULT_SB_URL);
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const [connStatus,setConnStatus]=useState("idle"); // idle|checking|ok|fail
  const [connMsg,setConnMsg]=useState("");

  // Auto-test connection when url changes
  useEffect(()=>{
    if(!url.trim()){setConnStatus("idle");return;}
    setConnStatus("checking");
    const timer=setTimeout(async()=>{
      try{
        const r=await fetch(`${url.trim()}/rest/v1/`,{headers:{"apikey":anonKey.trim(),"Authorization":`Bearer ${anonKey.trim()}`},signal:AbortSignal.timeout(5000)});
        if(r.ok||r.status===200){
          setConnStatus("ok");
          setConnMsg(`Supabase REST reachable · ${url.trim()}`);
        } else {
          setConnStatus("fail");
          setConnMsg(`HTTP ${r.status} — check URL`);
        }
      }catch(e){
        setConnStatus("fail");
        setConnMsg(e.name==="TimeoutError"?"Timeout — Supabase unreachable":`Connection failed: ${e.message}`);
      }
    },800);
    return()=>clearTimeout(timer);
  },[url]);

  const go=async()=>{
    if(!url.trim()||!anonKey.trim()){setErr("Both URL and Anon Key are required.");return;}
    setLoading(true);setErr("");
    const db=mkDB(url.trim(),anonKey.trim());
    const ok=await db.testConn();
    if(!ok){setErr("Could not connect. Check URL, anon key and ensure homeplanner schema exists.");setLoading(false);return;}
    LS.set(CK.setup,{url:url.trim(),anonKey:anonKey.trim()});
    setLoading(false);
    onDone({url:url.trim(),anonKey:anonKey.trim()});
  };

  return(
    <div className="login-wrap" style={{background:C.bg,minHeight:"100%"}}>
      <div className="login-card" style={{background:C.card,border:`1px solid ${C.border}`}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:48,marginBottom:8}}>🏡</div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:900,color:C.accent}}>HomePlanner Pro</div>
          <div style={{color:C.muted,fontSize:11,marginTop:4}}>v{APP_VER} · Supabase Setup</div>
        </div>
        <div style={{background:C.faint,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 16px",marginBottom:20,fontSize:12,color:C.muted,lineHeight:1.7}}>
          Enter your <strong style={{color:C.text}}>self-hosted Supabase</strong> URL and anon key. Data stays on your server.
        </div>

        {/* Live connection indicator */}
        <div style={{
          display:"flex",alignItems:"center",gap:10,
          padding:"12px 16px",borderRadius:10,marginBottom:18,
          background:connStatus==="ok"?C.green+"15":connStatus==="fail"?C.red+"15":connStatus==="checking"?C.gold+"15":C.faint,
          border:`1px solid ${connStatus==="ok"?C.green:connStatus==="fail"?C.red:connStatus==="checking"?C.gold:C.border}`,
          transition:"all .3s"
        }}>
          {connStatus==="checking"&&<span style={{width:14,height:14,borderRadius:"50%",border:`2px solid ${C.gold}`,borderTopColor:"transparent",display:"inline-block",animation:"spin .8s linear infinite",flexShrink:0}}/>}
          {connStatus==="ok"&&<span style={{fontSize:16}}>✅</span>}
          {connStatus==="fail"&&<span style={{fontSize:16}}>❌</span>}
          {connStatus==="idle"&&<span style={{fontSize:16}}>🔌</span>}
          <div>
            <div style={{fontSize:12,fontWeight:700,color:connStatus==="ok"?C.green:connStatus==="fail"?C.red:connStatus==="checking"?C.gold:C.muted}}>
              {connStatus==="ok"?"Supabase Connected":connStatus==="fail"?"Connection Failed":connStatus==="checking"?"Testing Supabase…":"Enter URL & key to test"}
            </div>
            {connMsg&&<div style={{fontSize:10,color:C.muted,marginTop:2}}>{connMsg}</div>}
          </div>
        </div>
        <Fld label="Supabase URL">
          <Inp value={url} onChange={setUrl} placeholder="http://192.168.1.20:8000" C={C}/>
        </Fld>
        <Fld label="Anon Key">
          <Inp value={anonKey} onChange={setAnonKey} placeholder="eyJhbGciOiJIUzI1NiIs…" type="password" C={C}/>
        </Fld>
        <div style={{fontSize:10,color:C.muted,marginBottom:16,lineHeight:1.6}}>
          Supabase Dashboard → Settings → API → <code>anon public</code> key
        </div>
        {err&&<div style={{background:C.red+"15",border:`1px solid ${C.red}33`,borderRadius:8,padding:"10px 14px",fontSize:12,color:C.red,marginBottom:14}}>{err}</div>}
        <Btn full onClick={go} loading={loading} C={C}>Test & Save Connection →</Btn>
      </div>
    </div>
  );
}

// AUTH SCREEN (login / register)
// ═══════════════════════════════════════════════
function AuthScreen({db,onLogin}){
  const C=mkTheme(true,"#38bdf8");
  const [mode,setMode]=useState("login");
  const [dbStatus,setDbStatus]=useState("checking");
  const [dbMsg,setDbMsg]=useState("");
  const [anonKey,setAnonKey]=useState("");

  useEffect(()=>{
    (async()=>{
      try{
        const setup=JSON.parse(localStorage.getItem("hp_sb_setup")||"{}");
        if(!setup.url||!setup.anonKey){setDbStatus("fail");setDbMsg("No Supabase config found — reset and setup again");return;}
        const r=await fetch(`${setup.url}/rest/v1/`,{headers:{"apikey":setup.anonKey||"","Authorization":`Bearer ${setup.anonKey||""}`},signal:AbortSignal.timeout(5000)});
        if(r.ok){setDbStatus("ok");setDbMsg(setup.url);}
        else{setDbStatus("fail");setDbMsg(`HTTP ${r.status}`);}
      }catch(e){
        setDbStatus("fail");
        setDbMsg(e.name==="TimeoutError"?"Supabase unreachable (timeout)":`${e.message}`);
      }
    })();
  },[]);

  const [email,setEmail]=useState("");
  const [password,setPassword]=useState("");
  const [fullName,setFullName]=useState("");
  const [username,setUsername]=useState("");
  const [confirmPwd,setConfirmPwd]=useState("");
  const [city,setCity]=useState("");
  const [budget,setBudget]=useState("");
  const [family,setFamily]=useState("");
  const [timeline,setTimeline]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const [showPwd,setShowPwd]=useState(false);

  const login=async()=>{
    if(!email.trim()||!password){setErr("Enter email and password.");return;}
    setLoading(true);setErr("");
    const res=await db.authWithPassword(email.trim().toLowerCase(),password);
    if(res.error){setErr(res.error);setLoading(false);return;}
    const user=res.record;
    const avatarColor=user.avatar_color||ACCENTS[Math.floor(Math.random()*ACCENTS.length)].v;
    const session={userId:user.id,username:user.username||user.email,fullName:user.name||user.username||user.email,avatarColor,token:res.token};
    LS.set(CK.session,session);
    setLoading(false);
    onLogin(session);
  };

  const register=async()=>{
    if(!email.trim()||!password||!fullName.trim()){setErr("Name, email and password are required.");return;}
    if(password!==confirmPwd){setErr("Passwords do not match.");return;}
    if(password.length<8){setErr("Password must be at least 8 characters.");return;}
    setLoading(true);setErr("");
    const avatarColor=ACCENTS[Math.floor(Math.random()*ACCENTS.length)].v;
    const res=await db.registerUser(email.trim().toLowerCase(),password,username.trim()||undefined,fullName.trim());
    if(res.error){setErr(res.error);setLoading(false);return;}
    await db.patch("users",res.record.id,{avatar_color:avatarColor}).catch(()=>{});
    const authRes=await db.authWithPassword(email.trim().toLowerCase(),password);
    if(authRes.error){setErr("Registered! Now sign in.");setMode("login");setLoading(false);return;}
    if(city.trim()){
      await db.post("profiles",{city:city.trim(),budget:Number(budget)||null,family:family.trim(),timeline:timeline.trim(),user_id:res.record.id}).catch(()=>{});
    }
    const user=authRes.record;
    const session={userId:user.id,username:user.username||user.email,fullName:user.name||fullName.trim(),avatarColor,token:authRes.token};
    LS.set(CK.session,session);
    setLoading(false);
    onLogin(session);
  };

  return(
    <div className="login-wrap" style={{background:C.bg,flex:1,overflowY:"auto"}}>
      <div className="login-card" style={{background:C.card,border:`1px solid ${C.border}`}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:40,marginBottom:6}}>🏡</div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:24,fontWeight:900,color:C.accent}}>HomePlanner Pro</div>
          <div style={{color:C.muted,fontSize:11,marginTop:2}}>v{APP_VER}</div>
        </div>

        {/* Supabase connection status */}
        <div style={{
          display:"flex",alignItems:"center",gap:10,
          padding:"10px 14px",borderRadius:10,marginBottom:16,
          background:dbStatus==="ok"?C.green+"15":dbStatus==="fail"?C.red+"15":C.gold+"15",
          border:`1.5px solid ${dbStatus==="ok"?C.green:dbStatus==="fail"?C.red:C.gold}`,
          transition:"all .3s"
        }}>
          {dbStatus==="checking"&&<span style={{width:13,height:13,borderRadius:"50%",border:`2px solid ${C.gold}`,borderTopColor:"transparent",display:"inline-block",animation:"spin .8s linear infinite",flexShrink:0}}/>}
          {dbStatus==="ok"&&<span style={{fontSize:15,flexShrink:0}}>✅</span>}
          {dbStatus==="fail"&&<span style={{fontSize:15,flexShrink:0}}>❌</span>}
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:11,fontWeight:700,color:dbStatus==="ok"?C.green:dbStatus==="fail"?C.red:C.gold}}>
              {dbStatus==="checking"?"Connecting to Supabase…":dbStatus==="ok"?"Supabase Connected ✓":"Supabase Unreachable"}
            </div>
            {dbMsg&&<div style={{fontSize:10,color:C.muted,marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{dbMsg}</div>}
          </div>
          {dbStatus==="fail"&&(
            <button onClick={()=>{localStorage.removeItem("hp_sb_setup");window.location.reload();}}
              style={{background:"none",border:`1px solid ${C.red}`,borderRadius:6,color:C.red,fontSize:10,padding:"3px 8px",cursor:"pointer",flexShrink:0,fontFamily:"inherit"}}>
              Reset
            </button>
          )}
        </div>

// LIVE CONNECTION STATUS CARD
// ═══════════════════════════════════════════════
function LiveConnectionCard({C,isOnline,syncStatus,session}){
  const [status,    setStatus]   = useState("checking");
  const [latency,   setLatency]  = useState(null);
  const [lastCheck, setLastCheck]= useState(null);
  const [version,   setVersion]  = useState(null);
  const [testing,   setTesting]  = useState(false);
  const [showLogs,  setShowLogs] = useState(false);
  const [logs,      setLogs]     = useState([]);
  const logsEndRef = useRef(null);

  const addLog=(level,msg,detail="")=>{
    const entry={id:Date.now()+Math.random(),ts:new Date(),level,msg,detail};
    setLogs(prev=>[...prev,entry].slice(-80)); // keep last 80 entries
  };

  const runTest = async()=>{
    setTesting(true);
    const setup=LS.get("hp_sb_setup")||{};
    if(!setup.url){
      setStatus("noconfig");
      addLog("warn","No Supabase URL configured","Go to Settings → Reset to set a URL");
      setTesting(false);return;
    }
    const targetUrl=`${setup.url}/rest/v1/`;
    addLog("info",`Testing connection…`,`GET ${targetUrl}`);
    try{
      const t0=Date.now();
      const r=await fetch(targetUrl,{headers:{"apikey":setup.anonKey||"","Authorization":`Bearer ${setup.anonKey||""}`},signal:AbortSignal.timeout(6000)});
      const ms=Date.now()-t0;
      setLatency(ms);
      setLastCheck(new Date());
      const bodyText=await r.text().catch(()=>"");
      if(r.ok){
        setStatus("ok");
        const sv=r.headers.get("server")||null;
        if(sv) setVersion(sv);
        addLog("success",`Connected ✓  (${ms}ms)`,`HTTP ${r.status} · ${setup.url}`);
        try{
          const j=JSON.parse(bodyText);
          if(j?.code) addLog("info",`Supabase code: ${j.code}`,JSON.stringify(j));
        }catch{}
      } else if(r.status===401||r.status===403){
        setStatus("auth_fail");
        addLog("error",`Auth failed — HTTP ${r.status}`,`Response: ${bodyText.slice(0,200)}`);
      } else if(r.status===404){
        setStatus("schema_missing");
        addLog("error",`HTTP 404 — Endpoint not found`,`URL may be wrong or Supabase/PostgREST version mismatch. Response: ${bodyText.slice(0,200)}`);
      } else {
        setStatus("error_"+r.status);
        addLog("error",`HTTP ${r.status} from Supabase`,`Response: ${bodyText.slice(0,300)}`);
      }
    }catch(e){
      const isTimeout=e.name==="TimeoutError"||e.name==="AbortError";
      setStatus(isTimeout?"timeout":"unreachable");
      setLatency(null);
      setLastCheck(new Date());
      if(isTimeout){
        addLog("error","Request timed out (6s)",`Supabase at ${setup.url} did not respond. Check if Supabase/PostgREST is running.`);
      } else if(e.message?.includes("Failed to fetch")||e.message?.includes("NetworkError")){
        addLog("error","Network error — cannot reach host",`URL: ${setup.url}\nError: ${e.message}\nPossible causes: Supabase not running, wrong IP/port, CORS blocked, firewall.`);
      } else {
        addLog("error",`Unexpected error: ${e.name}`,e.message||"No details");
      }
    }
    setTesting(false);
  };

  // Also intercept db errors by patching global fetch (lightweight approach via custom event)
  useEffect(()=>{
    const handler=e=>{
      if(e.detail) addLog(e.detail.level||"info", e.detail.msg, e.detail.detail||"");
    };
    window.addEventListener("pb_log",handler);
    return()=>window.removeEventListener("pb_log",handler);
  },[]);

  useEffect(()=>{ runTest(); const t=setInterval(runTest,30000); return()=>clearInterval(t); },[]);

  useEffect(()=>{
    if(showLogs) logsEndRef.current?.scrollIntoView({behavior:"smooth"});
  },[logs,showLogs]);

  const setup=LS.get("hp_sb_setup")||{};
  const statusMap={
    checking:       {c:C.gold,   icon:"⏳", text:"Testing Supabase…"},
    ok:             {c:C.green,  icon:"✅", text:"Connected & healthy"},
    timeout:        {c:C.red,    icon:"⏱",  text:"Connection timed out"},
    unreachable:    {c:C.red,    icon:"❌", text:"Supabase unreachable"},
    auth_fail:      {c:C.red,    icon:"🔐", text:"Authentication failed"},
    schema_missing: {c:C.orange, icon:"⚠️", text:"Endpoint not found (404)"},
    noconfig:       {c:C.muted,  icon:"🔌", text:"No URL configured"},
  };
  const s=statusMap[status]||{c:C.orange,icon:"⚠️",text:`Error: ${status}`};

  const logColor={success:C.green,error:C.red,warn:C.gold,info:C.muted};
  const logIcon= {success:"✓",error:"✕",warn:"⚠",info:"·"};
  const errorCount=logs.filter(l=>l.level==="error").length;

  return(
    <div style={{borderRadius:12,overflow:"hidden",border:`1.5px solid ${s.c}44`}}>

      {/* ── Status Banner ── */}
      <div style={{background:s.c+"18",padding:"14px 16px",display:"flex",alignItems:"center",gap:12}}>
        <div style={{position:"relative",flexShrink:0}}>
          <span style={{fontSize:22}}>{s.icon}</span>
          {status==="ok"&&<span style={{position:"absolute",top:0,right:-2,width:8,height:8,borderRadius:"50%",background:C.green,boxShadow:`0 0 8px ${C.green}`,animation:"pulse 2s infinite"}}/>}
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:700,color:s.c}}>{s.text}</div>
          <div style={{fontSize:10,color:C.muted,marginTop:2}}>
            {latency!==null&&<><span style={{color:latency<200?C.green:latency<500?C.gold:C.red}}>{latency}ms</span> · </>}
            {lastCheck?<>Last check: {lastCheck.toLocaleTimeString()}</>:<>Not checked yet</>}
          </div>
        </div>
        <button onClick={runTest} disabled={testing}
          style={{background:"none",border:`1px solid ${s.c}`,borderRadius:7,color:s.c,fontSize:11,padding:"5px 10px",cursor:testing?"wait":"pointer",fontFamily:"inherit",flexShrink:0}}>
          {testing?<span className="spinner spin" style={{width:11,height:11,borderTopColor:s.c}}/>:"↻ Test"}
        </button>
      </div>

      {/* ── Info Grid ── */}
      <div style={{background:C.faint,padding:"12px 16px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {[
          {l:"URL",         v:setup.url||"Not set",    c:C.accent},
          {l:"Backend",     v:"Supabase",             c:C.teal},
          {l:"Network",     v:isOnline?"🌐 Online":"📴 Offline", c:isOnline?C.green:C.red},
          {l:"Sync",        v:{idle:"Idle",saving:"↑ Saving",saved:"✓ Saved",error:"✕ Error"}[syncStatus]||"Idle", c:{idle:C.muted,saving:C.gold,saved:C.green,error:C.red}[syncStatus]||C.muted},
          {l:"User",        v:session?.username||"—",  c:C.text},
          {l:"Auto-check",  v:"Every 30s",             c:C.muted},
        ].map(x=>(
          <div key={x.l} style={{background:C.card,borderRadius:7,padding:"8px 10px"}}>
            <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:2}}>{x.l}</div>
            <div style={{fontSize:11,fontWeight:600,color:x.c,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{x.v}</div>
          </div>
        ))}
      </div>

      {/* ── Fix Hints ── */}
      {(status==="timeout"||status==="unreachable")&&(
        <div style={{background:C.red+"12",padding:"10px 16px",fontSize:11,color:C.red,borderTop:`1px solid ${C.red}22`,lineHeight:1.7}}>
          💡 <strong>Fix:</strong> Supabase not reachable at <code style={{background:C.faint,padding:"1px 5px",borderRadius:3}}>{setup.url}</code><br/>
          Check: service running? Correct IP/port? Device on same network? Firewall open?
        </div>
      )}
      {status==="auth_fail"&&(
        <div style={{background:C.red+"12",padding:"10px 16px",fontSize:11,color:C.red,borderTop:`1px solid ${C.red}22`}}>
          💡 Session expired or token invalid. Log out and sign in again.
        </div>
      )}
      {status==="schema_missing"&&(
        <div style={{background:C.orange+"15",padding:"10px 16px",fontSize:11,color:C.orange,borderTop:`1px solid ${C.orange}22`,lineHeight:1.7}}>
          💡 <strong>Fix:</strong> URL wrong, anon key invalid, or PostgREST schema missing.<br/>
          Expected REST endpoint: <code style={{background:C.faint,padding:"1px 5px",borderRadius:3}}>{setup.url}/api/health</code>
        </div>
      )}
      {status==="ok"&&(
        <div style={{background:C.green+"10",padding:"10px 16px",fontSize:11,color:C.green,borderTop:`1px solid ${C.green}22`}}>
          ✓ Supabase REST is reachable. Data syncing normally.
        </div>
      )}

      {/* ── Log Toggle Button ── */}
      <div style={{borderTop:`1px solid ${C.border}`,background:C.card}}>
        <button onClick={()=>setShowLogs(v=>!v)}
          style={{width:"100%",padding:"10px 16px",background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",fontFamily:"inherit",color:C.muted,fontSize:12}}>
          <span style={{display:"flex",alignItems:"center",gap:8}}>
            <span>📋 Connection Logs</span>
            <span style={{fontSize:10,color:C.muted}}>({logs.length} entries)</span>
            {errorCount>0&&<span style={{background:C.red,color:"#fff",borderRadius:99,padding:"1px 7px",fontSize:10,fontWeight:700}}>{errorCount} error{errorCount>1?"s":""}</span>}
          </span>
          <span style={{fontSize:10}}>{showLogs?"▲ Hide":"▼ Show"}</span>
        </button>

        {showLogs&&(
          <div style={{borderTop:`1px solid ${C.border}`}}>
            {/* Log toolbar */}
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:C.faint,borderBottom:`1px solid ${C.border}`}}>
              <span style={{fontSize:10,color:C.muted,flex:1}}>
                {logs.length===0?"No logs yet — click ↻ Test to start":"Showing last 80 entries"}
              </span>
              <button onClick={()=>setLogs([])}
                style={{background:"none",border:`1px solid ${C.border}`,borderRadius:5,color:C.muted,fontSize:10,padding:"3px 8px",cursor:"pointer",fontFamily:"inherit"}}>
                🗑 Clear
              </button>
              <button onClick={runTest} disabled={testing}
                style={{background:C.accent,border:"none",borderRadius:5,color:"#03080f",fontSize:10,padding:"3px 8px",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>
                ↻ Run Test
              </button>
            </div>

            {/* Log entries */}
            <div style={{maxHeight:260,overflowY:"auto",fontFamily:"'DM Mono',monospace",fontSize:11,background:"#06080e"}}>
              {logs.length===0?(
                <div style={{padding:"20px",textAlign:"center",color:C.muted,fontSize:11}}>
                  No logs yet. Click "↻ Run Test" above.
                </div>
              ):logs.map(l=>(
                <div key={l.id} style={{display:"flex",gap:10,padding:"6px 12px",borderBottom:`1px solid #ffffff08`,alignItems:"flex-start"}}>
                  {/* Timestamp + level */}
                  <div style={{flexShrink:0,width:68,color:"#405570",fontSize:10,paddingTop:1}}>
                    {l.ts.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}
                  </div>
                  {/* Level badge */}
                  <div style={{flexShrink:0,width:14,color:logColor[l.level]||C.muted,fontWeight:700,paddingTop:1}}>
                    {logIcon[l.level]||"·"}
                  </div>
                  {/* Message + detail */}
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{color:logColor[l.level]||C.text,fontWeight:l.level==="error"||l.level==="success"?700:400,wordBreak:"break-all"}}>
                      {l.msg}
                    </div>
                    {l.detail&&(
                      <div style={{color:"#405570",fontSize:10,marginTop:3,whiteSpace:"pre-wrap",wordBreak:"break-all",lineHeight:1.5}}>
                        {l.detail}
                      </div>
                    )}
                  </div>
                </div>
              ))}
              <div ref={logsEndRef}/>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

  // ── Undo/Redo ────────────────────────────────
  const snapshot=useCallback(()=>({sections:deepClone(sections),loans:deepClone(loans),recurring:deepClone(recurring),rooms:deepClone(rooms),smartDevs:deepClone(smartDevs),amcItems:deepClone(amcItems),amenities:deepClone(amenities),contacts:deepClone(contacts),parkingSlots:deepClone(parkingSlots),societyRules:deepClone(societyRules)}),[sections,loans,recurring,rooms,smartDevs,amcItems,amenities,contacts,parkingSlots,societyRules]);
  const pushHistory=useCallback(()=>{setHistory(h=>[...h,snapshot()].slice(-MAX_HIST));setFuture([]);},[snapshot]);
  const restoreSnap=useCallback(snap=>{if(!snap)return;setSections(snap.sections||[]);setLoans(snap.loans||[]);setRecurring(snap.recurring||[]);setRooms(snap.rooms||[]);setSmartDevs(snap.smartDevs||[]);setAmcItems(snap.amcItems||[]);setAmenities(snap.amenities||[]);setContacts(snap.contacts||[]);setParkingSlots(snap.parkingSlots||[]);setSocietyRules(snap.societyRules||[]);},[]);
  const undo=useCallback(()=>{if(!history.length){toast("Nothing to undo","error");return;}const prev=history[history.length-1];setFuture(f=>[snapshot(),...f].slice(0,MAX_HIST));setHistory(h=>h.slice(0,-1));restoreSnap(prev);toast("↩ Undone");},[history,snapshot,restoreSnap,toast]);
  const redo=useCallback(()=>{if(!future.length){toast("Nothing to redo","error");return;}const next=future[0];setHistory(h=>[...h,snapshot()].slice(-MAX_HIST));setFuture(f=>f.slice(1));restoreSnap(next);toast("↪ Redone");},[future,snapshot,restoreSnap,toast]);

    catch(e){console.error(e);setSyncStatus("error");toast("Sync error — saved locally","error");setTimeout(()=>setSyncStatus("idle"),3000);}
  },[toast]);

  // ── Keyboard shortcuts ────────────────────────
  useEffect(()=>{
    let gPressed=false;
    const h=e=>{
      if(e.key==="Escape"){setModal(null);setShowSearch(false);return;}
      if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA"||e.target.tagName==="SELECT")return;
      if(e.key==="/"){ e.preventDefault();setShowSearch(true);setTimeout(()=>searchRef.current?.focus(),50);return;}
      if(e.ctrlKey||e.metaKey){
        if(e.key==="z"){e.preventDefault();undo();return;}
        if(e.key==="y"){e.preventDefault();redo();return;}
      }
      if(e.key==="g"||e.key==="G"){gPressed=true;setTimeout(()=>gPressed=false,1000);return;}
      if(gPressed){if(e.key==="d"||e.key==="D"){setTab("dashboard");gPressed=false;}if(e.key==="p"||e.key==="P"){setTab("plan");gPressed=false;}}
    };
    window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);
  },[undo,redo]);

  // ── Load from Supabase (PostgREST) ─────────────

      db.get("sections",`?${f}&select=*,items(*)`),
      db.get("loans",`?${f}`),
      db.get("recurring",`?${f}`),
      db.get("rooms",`?${f}&select=*,furniture(*)`),
      db.get("smart_devices",`?${f}`),
      db.get("amc_items",`?${f}`),
      db.get("neighbourhood",`?${f}`),
      db.get("contacts",`?${f}`),
      db.get("parking",`?${f}`),
      db.get("society_rules",`?${f}`),
      db.get("documents",`?${f}`),
      db.get("key_dates",`?${f}`),
      db.get("commute_routes",`?${f}`),
      db.get("room_photos",`?${f}`),
      db.get("contractors",`?${f}`),
      db.get("snags",`?${f}`),
      db.get("payment_milestones",`?${f}`),
      db.get("utility_logs",`?${f}`),
      db.get("moodboard",`?${f}`),
      db.get("service_logs",`?${f}`),
      db.get("contractor_works",`?${f}`),
      db.get("util_meters",`?${f}`),
      db.get("income_logs",`?${f}`),
    ]);
    // Supabase/PostgREST returns array directly (unlike PocketBase .items wrapper)
    if(Array.isArray(secs))setSections(secs.map(s=>({...s,items:s.items||[]})));
    if(Array.isArray(lns))setLoans(lns);
    if(Array.isArray(recs))setRecurring(recs);
    if(Array.isArray(rms))setRooms(rms.map(r=>({...r,furniture:r.furniture||[]})));
    if(Array.isArray(sds))setSmartDevs(sds);
    if(Array.isArray(amcs))setAmcItems(amcs);
    if(Array.isArray(ams))setAmenities(ams);
    if(Array.isArray(cts))setContacts(cts);
    if(Array.isArray(pks))setParkingSlots(pks);
    if(Array.isArray(srs))setSocietyRules(srs);
    if(Array.isArray(docs))setDocuments(docs);
    if(Array.isArray(kds))setKeyDates(kds);
    if(Array.isArray(coms))setCommuteRoutes(coms);
    if(Array.isArray(phs))setPhotos(phs);
    if(Array.isArray(cntrs))setContractors(cntrs);
    if(Array.isArray(snagR))setSnags(snagR);
    if(Array.isArray(payR))setPayments(payR);
    if(Array.isArray(utilR))setUtilityLogs(utilR);
    if(Array.isArray(moodR))setMoodboard(moodR);
    if(Array.isArray(svcR))setServiceLogs(svcR);
    if(Array.isArray(cwR))setContractorWorks(cwR);
    if(Array.isArray(umR))setUtilMeters(umR);
    if(Array.isArray(incR))setIncomeLog(incR);

  // ── Search ────────────────────────────────────
  const searchResults=useMemo(()=>{
    if(!searchQ.trim())return[];

    sections.forEach(s=>{if(s.name.toLowerCase().includes(q))res.push({type:"Section",label:s.name,go:()=>{setTab("plan");setActiveSec(s.id);}});(s.items||[]).forEach(i=>{if(i.name.toLowerCase().includes(q))res.push({type:"Item",label:`${i.name} — ${s.name}`,go:()=>{setTab("plan");setActiveSec(s.id);}});});});

  const exportCSVData=type=>{
    let rows=[],headers=[],fn="";
    if(type==="items"){headers=["Section","Item","Cost","Qty","Total","Priority","Notes","Done"];sections.forEach(s=>(s.items||[]).forEach(i=>rows.push([s.name,i.name,i.cost,i.qty,(Number(i.cost)||0)*(Number(i.qty)||1),i.priority,i.notes||"",i.done?"Yes":"No"])));fn="items.csv";}
    else if(type==="loans"){headers=["Name","Type","Amount","Rate","Tenure","Rate Type","EMI","Notes"];loanEMIs.forEach(l=>rows.push([l.name||l.type,l.type,l.amount,l.rate,l.tenure,l.rateType||l.rate_type,l.emi,l.notes||""]));fn="loans.csv";}

  // ── Import CSV ────────────────────────────────

    e.preventDefault();
    if(!dragSec||dragSec===targetId)return;
    setSections(prev=>{
      const arr=[...prev];
      const fromIdx=arr.findIndex(s=>s.id===dragSec);
      const toIdx=arr.findIndex(s=>s.id===targetId);
      if(fromIdx<0||toIdx<0)return arr;
      const [moved]=arr.splice(fromIdx,1);
      arr.splice(toIdx,0,moved);
      return arr.map((s,i)=>({...s,position:i}));
    });
    setDragSec(null);
  };
  const onItemDragStart=(secId,itemId)=>setDragItem({secId,itemId});
  const onItemDrop=(e,secId,targetItemId)=>{
    e.preventDefault();
    if(!dragItem||dragItem.itemId===targetItemId)return;
    setSections(prev=>prev.map(sec=>{
      if(sec.id!==secId)return sec;
      const arr=[...sec.items];
      const fromIdx=arr.findIndex(i=>i.id===dragItem.itemId);
      const toIdx=arr.findIndex(i=>i.id===targetItemId);
      if(fromIdx<0||toIdx<0)return sec;
      const[moved]=arr.splice(fromIdx,1);
      arr.splice(toIdx,0,moved);
      return{...sec,items:arr.map((i,idx)=>({...i,position:idx}))};
    }));
    setDragItem(null);
  };

      const b={...contractorWorkf,cost:Number(contractorWorkf.cost)||0,payment_due:Number(contractorWorkf.payment_due)||0,profile_id:profileId};
      const c=await db.post("contractor_works",b);
      setContractorWorks(p=>[...p,{...(c||{id:lid()}),...b}]);
    });});
    setModal(null);setContractorWorkf({contractor_id:"",work:"",date:"",cost:"",payment_due:"",notes:""});
  };
  const delContractorWork=id=>{mutate(()=>{sync(()=>db.del("contractor_works",id));setContractorWorks(p=>p.filter(x=>x.id!==id));});};

  // ── Utility Meters ────────────────────────
  const saveUtilMeter=()=>{
    mutate(()=>{sync(async()=>{
      const b={...utilMeterf,rate_per_unit:Number(utilMeterf.rate_per_unit)||0,profile_id:profileId};
      // upsert by type
      const existing=utilMeters.find(m=>m.type===b.type);
      if(existing){await db.patch("util_meters",existing.id,b);setUtilMeters(p=>p.map(x=>x.id===existing.id?{...x,...b}:x));}
      else{const c=await db.post("util_meters",b);setUtilMeters(p=>[...p,{...(c||{id:lid()}),...b}]);}
    });});
    setModal(null);
  };

  // ── Income Logs ───────────────────────────
  const saveIncome=()=>{
    if(!incomef.amount||!incomef.month)return;
    mutate(()=>{sync(async()=>{
      const b={...incomef,amount:Number(incomef.amount)||0,profile_id:profileId};
      if(editTarget){await db.patch("income_logs",editTarget.id,b);setIncomeLog(p=>p.map(x=>x.id===editTarget.id?{...x,...b}:x));}
      else{const c=await db.post("income_logs",b);setIncomeLog(p=>[...p,{...(c||{id:lid()}),...b}]);}
    });});
    setModal(null);setIncomef({source:"Salary",amount:"",month:"",notes:""});
  };
  const delIncome=id=>{mutate(()=>{sync(()=>db.del("income_logs",id));setIncomeLog(p=>p.filter(x=>x.id!==id));});};

  // ══ PDF EXPORT ═══════════════════════════════════
  const exportPDF=async()=>{
    setPdfLoading(true);
    try{
      const{jsPDF}=window.jspdf;
      const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
      const W=210,M=15;
      let y=20;
      const LINE_H=7;
      const addText=(text,x,size=10,bold=false,color=[220,232,245])=>{
        doc.setFontSize(size);
        doc.setTextColor(...color);
        doc.setFont("helvetica",bold?"bold":"normal");
        const lines=doc.splitTextToSize(String(text||""),W-x-M);
        doc.text(lines,x,y);
        y+=lines.length*LINE_H;
      };
      const addLine=(color=[30,40,53])=>{doc.setDrawColor(...color);doc.line(M,y,W-M,y);y+=4;};
      const nextPage=()=>{doc.addPage();y=20;};
      const checkPage=(needed=20)=>{if(y+needed>280)nextPage();};
      const addSection=(title,color=[56,189,248])=>{
        checkPage(15);
        doc.setFillColor(15,21,32);
        doc.roundedRect(M,y-5,W-M*2,10,2,2,"F");
        doc.setFontSize(11);doc.setTextColor(...color);doc.setFont("helvetica","bold");
        doc.text(title,M+3,y+2);
        y+=10;addLine();
      };

      // ── COVER PAGE ──
      doc.setFillColor(6,8,14);
      doc.rect(0,0,W,297,"F");
      doc.setFillColor(56,189,248,0.1);
      doc.roundedRect(M,30,W-M*2,80,5,5,"F");
      doc.setFontSize(28);doc.setTextColor(56,189,248);doc.setFont("helvetica","bold");
      doc.text("HomePlanner Pro",W/2,55,{align:"center"});
      doc.setFontSize(14);doc.setTextColor(220,232,245);doc.setFont("helvetica","normal");
      doc.text(profile.city||"My Home Plan",W/2,68,{align:"center"});
      doc.setFontSize(10);doc.setTextColor(100,120,150);
      doc.text(`Generated: ${new Date().toLocaleDateString("en-IN")}`,W/2,78,{align:"center"});
      doc.text(`User: ${session.fullName} (@${session.username})`,W/2,86,{align:"center"});
      if(profile.budget)doc.text(`Budget: ${fmtK(Number(profile.budget))}`,W/2,94,{align:"center"});
      // Quick stats
      const stats=[[`🏗 One-Time`,fmtK(grandOneTime+smartTotal)],[`📅 Monthly Burden`,fmt(totalMonthly)],[`🏠 Rooms`,`${rooms.length} (${totalSqft} sq ft)`],[`🏦 Loans`,`${loans.length} (EMI ${fmt(totalEMI)}/mo)`]];
      let sx=M; const sw=(W-M*2)/2;
      y=125;
      stats.forEach(([l,v],i)=>{
        if(i%2===0&&i>0){y+=18;}
        const cx=M+(i%2)*sw;
        doc.setFillColor(15,21,32);doc.roundedRect(cx,y,sw-4,14,2,2,"F");
        doc.setFontSize(8);doc.setTextColor(64,85,112);doc.text(l,cx+4,y+6);
        doc.setFontSize(12);doc.setTextColor(220,232,245);doc.setFont("helvetica","bold");doc.text(v,cx+4,y+13);doc.setFont("helvetica","normal");
      });
      y=170;
      doc.setFontSize(9);doc.setTextColor(64,85,112);
      doc.text(`v${APP_VER} · HomePlanner Pro`,W/2,y,{align:"center"});
      doc.addPage();y=20;

      // ── FINANCIAL SUMMARY ──
      addSection("💰 FINANCIAL SUMMARY");
      const finRows=[
        ["Property Budget",fmtK(Number(profile.budget)||0)],
        ["One-Time Spend (Plan)",fmtK(grandOneTime)],
        ["Smart Home Devices",fmtK(smartTotal)],
        ["Total One-Time",fmtK(grandOneTime+smartTotal)],
        ["Total Loan Amount",fmtK(loans.reduce((a,l)=>a+(Number(l.amount)||0),0))],
        ["Combined Monthly EMI",fmt(totalEMI)],
        ["Monthly Recurring Costs",fmt(totalMonRec)],
        ["Total Monthly Burden",fmt(totalMonthly)],
        ["Annual Burden",fmtK(totalMonthly*12)],
      ];
      finRows.forEach(([l,v])=>{
        checkPage(8);
        doc.setFontSize(10);doc.setTextColor(64,85,112);doc.setFont("helvetica","normal");doc.text(l,M,y);
        doc.setTextColor(220,232,245);doc.setFont("helvetica","bold");doc.text(v,W-M,y,{align:"right"});
        y+=LINE_H;
      });
      y+=4;

      // ── LOANS ──
      if(loanEMIs.length){
        addSection("🏦 LOANS & EMI");
        loanEMIs.forEach(loan=>{
          checkPage(24);
          const tot=loan.emi*Number(loan.tenure)*12;
          doc.setFontSize(11);doc.setTextColor(56,189,248);doc.setFont("helvetica","bold");
          doc.text(`${loan.name||loan.type} — ${loan.rateType||loan.rate_type}`,M,y);y+=LINE_H;
          const lr=[["Principal",fmtK(Number(loan.amount))],["Rate",loan.rate+"% p.a."],["Tenure",loan.tenure+" yrs"],["Monthly EMI",fmt(loan.emi)],["Total Payable",fmtK(tot)],["Total Interest",fmtK(tot-Number(loan.amount))]];
          lr.forEach(([l,v],i)=>{
            const cx=M+(i%3)*60;
            if(i%3===0&&i>0)y+=LINE_H;
            doc.setFontSize(8);doc.setTextColor(64,85,112);doc.setFont("helvetica","normal");doc.text(l,cx,y);
            doc.setFontSize(9);doc.setTextColor(220,232,245);doc.setFont("helvetica","bold");doc.text(v,cx,y+5);
          });
          y+=LINE_H*2+4;
        });
      }

      // ── PLAN SECTIONS ──
      if(sections.length){
        checkPage(15);addSection("🏗 PLAN SECTIONS");
        sections.forEach(sec=>{
          checkPage(12);
          doc.setFontSize(11);doc.setTextColor(240,165,0);doc.setFont("helvetica","bold");
          doc.text(`${sec.name} — ${fmt(secTotal(sec))}`,M,y);y+=LINE_H;
          (sec.items||[]).forEach(item=>{
            checkPage(7);
            doc.setFontSize(9);doc.setTextColor(item.done?[64,85,112]:[220,232,245]);doc.setFont("helvetica",item.done?"italic":"normal");
            const tick=item.done?"✓ ":"  ";
            doc.text(`${tick}${item.name}`,M+4,y);
            doc.text(`${fmt((item.cost||0)*(item.qty||1))}`,W-M,y,{align:"right"});
            y+=6;
          });
          y+=3;
        });
      }

      // ── ROOMS ──
      if(rooms.length){
        checkPage(15);addSection("🏠 ROOMS");
        rooms.forEach(room=>{
          checkPage(8);
          doc.setFontSize(10);doc.setTextColor(38,198,176);doc.setFont("helvetica","bold");
          doc.text(`${room.name} — ${fmtSq(room.sqft)} — ${room.direction} facing`,M,y);y+=6;
          if(room.color){doc.setFontSize(8);doc.setTextColor(100,120,150);doc.setFont("helvetica","normal");doc.text(`Colour: ${room.color}`,M+4,y);y+=5;}
        });
      }

      // ── RECURRING ──
      if(recurring.length){
        checkPage(15);addSection("🔁 MONTHLY RECURRING COSTS");
        recurring.forEach(r=>{
          checkPage(7);
          doc.setFontSize(9);doc.setTextColor(220,232,245);doc.setFont("helvetica","normal");
          doc.text(`${r.icon||""} ${r.name} (${r.frequency})`,M,y);
          doc.text(`${fmt(toMo(r))}/mo`,W-M,y,{align:"right"});
          y+=6;
        });
        checkPage(8);
        doc.setFontSize(10);doc.setTextColor(255,140,66);doc.setFont("helvetica","bold");
        doc.text(`Total Monthly Recurring: ${fmt(totalMonRec)}`,M,y);y+=LINE_H;
      }

      // ── AMC ──
      if(amcItems.length){
        checkPage(15);addSection("🔧 AMC & WARRANTY");
        amcItems.forEach(item=>{
          checkPage(8);
          const ad=daysTo(item.amc_expiry||item.amcExpiry);
          const col=ad!=null&&ad<90?(ad<0?[255,95,95]:[255,140,66]):[46,204,138];
          doc.setFontSize(9);doc.setTextColor(220,232,245);doc.setFont("helvetica","normal");
          doc.text(`${item.name} (${item.category})`,M,y);
          doc.setTextColor(...col);
          doc.text(expL(ad),W-M,y,{align:"right"});
          y+=6;
        });
      }

      // ── DOCUMENTS ──
      if(documents.length){
        checkPage(15);addSection("📋 DOCUMENTS CHECKLIST");
        const dGroups=[...new Set(documents.map(d=>d.category))];
        dGroups.forEach(cat=>{
          checkPage(10);
          doc.setFontSize(10);doc.setTextColor(56,189,248);doc.setFont("helvetica","bold");
          doc.text(cat,M,y);y+=LINE_H;
          documents.filter(d=>d.category===cat).forEach(d=>{
            checkPage(7);
            const sc=DOC_STATUS_C[d.status]||"#888";
            const rgb=sc.replace("#","");
            const r2=parseInt(rgb.substr(0,2),16),g2=parseInt(rgb.substr(2,2),16),b2=parseInt(rgb.substr(4,2),16);
            doc.setFontSize(9);doc.setTextColor(220,232,245);doc.setFont("helvetica","normal");
            doc.text(`${d.name}`,M+4,y);
            doc.setTextColor(r2,g2,b2);doc.setFont("helvetica","bold");
            doc.text(d.status,W-M,y,{align:"right"});
            y+=6;
          });
          y+=2;
        });
      }

      // ── KEY DATES ──
      if(keyDates.length){
        checkPage(15);addSection("📅 KEY DATES");
        [...keyDates].sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(kd=>{
          checkPage(7);
          const d=daysTo(kd.date);
          doc.setFontSize(9);doc.setTextColor(220,232,245);doc.setFont("helvetica","normal");
          doc.text(`${kd.type}: ${kd.label}`,M,y);
          doc.text(`${kd.date} (${expL(d)})`,W-M,y,{align:"right"});
          y+=6;
        });
      }

      // ── NEIGHBOURHOOD ──
      if(amenities.length||commuteRoutes.length){
        checkPage(15);addSection("🌏 NEIGHBOURHOOD");
        if(commuteRoutes.length){
          doc.setFontSize(10);doc.setTextColor(56,189,248);doc.setFont("helvetica","bold");doc.text("Commute Routes",M,y);y+=LINE_H;
          commuteRoutes.forEach(cr=>{
            checkPage(7);
            doc.setFontSize(9);doc.setTextColor(220,232,245);doc.setFont("helvetica","normal");
            doc.text(`${cr.mode||""} → ${cr.destination}`,M+4,y);
            const details=[];
            if(cr.distance_km)details.push(`${cr.distance_km}km`);
            if(cr.time_mins)details.push(`${cr.time_mins}min`);
            if(cr.cost_per_day)details.push(`₹${cr.cost_per_day}/day`);
            doc.text(details.join(" · "),W-M,y,{align:"right"});
            y+=6;
          });
          y+=4;
        }
        if(amenities.length){
          doc.setFontSize(10);doc.setTextColor(56,189,248);doc.setFont("helvetica","bold");doc.text("Nearby Places",M,y);y+=LINE_H;
          amenities.forEach(am=>{
            checkPage(6);
            doc.setFontSize(9);doc.setTextColor(220,232,245);doc.setFont("helvetica","normal");
            doc.text(`${am.type}: ${am.name}`,M+4,y);
            if(am.distance)doc.text(`${am.distance}km`,W-M,y,{align:"right"});
            y+=5;
          });
        }
      }

      // ── FOOTER on each page ──
      const totalPages=doc.internal.getNumberOfPages();
      for(let p=1;p<=totalPages;p++){
        doc.setPage(p);
        doc.setFontSize(8);doc.setTextColor(64,85,112);doc.setFont("helvetica","normal");
        doc.text(`HomePlanner Pro v${APP_VER} · ${profile.city||""} · Page ${p} of ${totalPages}`,W/2,290,{align:"center"});
      }

      const fname=`HomePlan_${(profile.city||"Plan").replace(/\s/g,"_")}_${new Date().toISOString().slice(0,10)}.pdf`;
      doc.save(fname);
      toast(`📄 ${fname} downloaded!`);
    }catch(err){
      console.error("PDF error:",err);
      toast("PDF export failed: "+err.message,"error");
    }
    setPdfLoading(false);
  };

  // ── Sync badge ────────────────────────────────
  const syncBdg={idle:{c:C.muted,l:"●"},saving:{c:C.gold,l:"↑"},saved:{c:C.green,l:"✓"},error:{c:C.red,l:"✕"}}[syncStatus];

  // ── Helper renderers ──────────────────────────
  const B=(props)=><Btn {...props} C={C}/>;
  // useCallback ensures I and S are stable references — prevents input unmount on re-render
  const I=useCallback((props)=><Inp {...props} C={C}/>, [C]);
  const S=useCallback((props)=><Sel {...props} C={C}/>, [C]);
  const Cd=(props)=><Card {...props} C={C}/>;
  const SC=(props)=><StCard {...props} C={C}/>;
  // Stable modal wrapper — useCallback prevents re-creation on every render
  const Ml=useCallback((props)=><Modal {...props} C={C}/>,[C]);

  const R=(idx,total)=>({
    display:"grid",alignItems:"center",padding:"11px 14px",
    borderBottom:idx<total-1?`1px solid ${C.border}`:"none",
    transition:"background .15s",cursor:"default",
  });

  // ════════════════════════════════════════════
  // RENDER
  // ════════════════════════════════════════════
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:C.bg,color:C.text}}>

      {/* TOASTS */}
      <div style={{position:"fixed",bottom:24,right:16,zIndex:500,display:"flex",flexDirection:"column",gap:8,pointerEvents:"none"}}>
        {toasts.map(t=>(
          <div key={t.id} className="toast-item" style={{background:t.type==="error"?C.red:t.type==="success"?C.green:C.gold,color:"#03080f",borderRadius:10,padding:"10px 16px",fontSize:12,fontWeight:700,boxShadow:"0 8px 24px #000a",maxWidth:280}}>
            {t.msg}
          </div>
        ))}
      </div>

      {/* GLOBAL SEARCH */}
      {showSearch&&(
        <div style={{position:"fixed",inset:0,background:"#000c",zIndex:400,display:"flex",flexDirection:"column",alignItems:"center",paddingTop:60,padding:"60px 16px 20px"}} onClick={e=>{if(e.target===e.currentTarget){setShowSearch(false);setSearchQ("");}}}>
          <div style={{width:"100%",maxWidth:520}}>
            <div style={{position:"relative",marginBottom:10}}>
              <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",color:C.muted,fontSize:16}}>🔍</span>
              <input ref={searchRef} value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="Search anything…" autoFocus
                style={{width:"100%",background:C.card,border:`2px solid ${C.accent}`,borderRadius:12,color:C.text,padding:"12px 12px 12px 44px",fontSize:16,fontFamily:"'DM Mono',monospace",outline:"none"}}/>
            </div>
            {searchResults.length>0&&(
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden"}}>
                {searchResults.map((r,i)=>(
                  <div key={i} className="hrow" onClick={()=>{r.go();setShowSearch(false);setSearchQ("");}}
                    style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",cursor:"pointer",borderBottom:i<searchResults.length-1?`1px solid ${C.border}`:"none",background:C.card,transition:"background .15s"}}>
                    <Pill label={r.type} color={C.accent} sm/>
                    <span style={{fontSize:13,color:C.text}}>{r.label}</span>
                  </div>
                ))}
              </div>
            )}
            {searchQ&&!searchResults.length&&<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:20,textAlign:"center",color:C.muted,fontSize:13}}>No results for "{searchQ}"</div>}
            <div style={{textAlign:"center",marginTop:10,fontSize:11,color:C.muted}}>Tap outside or press Esc to close</div>
          </div>
        </div>
      )}

      {/* TOP BAR */}
      <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,padding:"0 14px",display:"flex",alignItems:"center",justifyContent:"space-between",height:48,flexShrink:0,gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:10,minWidth:0}}>
          <span style={{fontFamily:"'Playfair Display',serif",fontSize:17,fontWeight:900,color:C.accent,flexShrink:0}}>🏡</span>
          <span style={{fontSize:11,color:C.muted,maxWidth:130,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{profile.city||"HomePlanner"}</span>
          <Pill label={overBudget?"⚠ Over":"✓ OK"} color={overBudget?C.red:C.green}/>
          <span style={{fontSize:10,color:syncBdg.c,fontWeight:700}} className={syncStatus==="saving"?"pulse":""}>{syncBdg.l}</span>
          {!isOnline&&<Pill label="📴 Offline" color={C.orange}/>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
          <button onClick={()=>setShowSearch(true)} style={{background:C.faint,border:`1px solid ${C.border}`,borderRadius:7,color:C.muted,fontSize:11,padding:"5px 10px",cursor:"pointer"}}>🔍</button>
          <div title={isOnline?(syncStatus==="error"?"Sync error":"Supabase connected"):"Offline"}
            onClick={()=>setTab("settings")}
            style={{display:"flex",alignItems:"center",gap:5,padding:"4px 8px",borderRadius:6,background:C.faint,border:`1px solid ${C.border}`,cursor:"pointer"}}>
            <span style={{width:8,height:8,borderRadius:"50%",flexShrink:0,display:"inline-block",
              background:syncStatus==="saving"?C.gold:syncStatus==="error"?C.red:isOnline?C.green:C.orange,
              boxShadow:isOnline&&syncStatus!=="error"?("0 0 7px "+(syncStatus==="saving"?C.gold:C.green)):"none",
              animation:syncStatus==="saving"||!isOnline?"pulse 1.5s infinite":"none"}}/>
            <span style={{fontSize:9,color:isOnline&&syncStatus!=="error"?C.green:syncStatus==="error"?C.red:C.orange,fontWeight:700}}>
              {syncStatus==="saving"?"SYNC":syncStatus==="error"?"ERR":isOnline?"LIVE":"OFF"}
            </span>
          </div>
          <button onClick={undo} disabled={!history.length} style={{background:"none",border:"none",color:history.length?C.muted:"transparent",fontSize:16,cursor:"pointer",padding:"4px"}} title="Undo">↩</button>
          <button onClick={redo} disabled={!future.length} style={{background:"none",border:"none",color:future.length?C.muted:"transparent",fontSize:16,cursor:"pointer",padding:"4px"}} title="Redo">↪</button>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:9,color:C.muted}}>MONTHLY</div>
            <div style={{fontSize:12,fontWeight:800,color:C.red,fontFamily:"'Playfair Display',serif"}}>{fmt(totalMonthly)}</div>
          </div>
          <div style={{width:30,height:30,borderRadius:"50%",background:session.avatarColor+"33",border:`2px solid ${session.avatarColor}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:session.avatarColor,cursor:"pointer",flexShrink:0}} onClick={()=>setTab("settings")}>
            {(session.fullName||session.username||"U")[0].toUpperCase()}
          </div>
        </div>
      </div>

      {/* TAB BAR */}
      <div className="tab-bar">
        {TABS.map(t=>(
          <button key={t.id} className={`tab-btn${tab===t.id?" active":""}`} onClick={()=>setTab(t.id)}>
            {t.label}
          </button>
        ))}
      </div>

      {/* CONTENT */}
      <div ref={swipeHintRef} className="swipe-hint">← swipe tabs →</div>
      <div className="content-area" onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>

        {/* ═══ PLAN TAB ════════════════════════════ */}
        {tab==="plan"&&(
          <div className="split-layout">
            <div className="sidebar">
              <div className="sidebar-inner">
                {sections.map(sec=>(
                  <button key={sec.id} className={`sidebar-btn${activeSec===sec.id?" active":""}`} onClick={()=>setActiveSec(sec.id)}>
                    <span style={{marginRight:5,fontSize:8,color:priC[sec.priority]}}>●</span>
                    {sec.name}
                  </button>
                ))}
                <button className="sidebar-btn" onClick={()=>openSecModal()} style={{borderStyle:"dashed",opacity:.7,marginTop:4}}>+ Section</button>
              </div>
              <div className="sidebar-footer">
                <div style={{fontSize:9,color:C.muted,marginBottom:2}}>TOTAL</div>
                <div style={{fontSize:15,fontWeight:800,color:overBudget?C.red:C.green,fontFamily:"'Playfair Display',serif"}}>{fmt(grandOneTime)}</div>
                {profile.budget&&<div style={{fontSize:9,color:C.muted}}>of {fmtK(Number(profile.budget))}</div>}
              </div>
            </div>
            <div className="main-panel">
              {!curSec?(
                <div style={{maxWidth:380,margin:"50px auto",textAlign:"center"}} className="fadeup">
                  <div style={{fontSize:44,marginBottom:10}}>🏗️</div>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:C.text,marginBottom:8}}>Start your plan</div>
                  <div style={{color:C.muted,fontSize:12,marginBottom:22,lineHeight:1.7}}>Create sections like "Kitchen", "Flooring", "Electrical" and add items with costs.</div>
                  <B onClick={()=>openSecModal()}>+ Create Section</B>
                </div>
              ):(
                <div className="fadeup">

                  if(!evMap[k])evMap[k]=[];

              documents.filter(d=>d.due_date).forEach(d=>addEv(d.due_date,{c:C.accent,l:`Doc: ${d.name}`,type:"doc"}));

              for(let i=0;i<firstDay;i++) days.push(null);
