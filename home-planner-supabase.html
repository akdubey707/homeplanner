            {/* Backup & Restore */}
            <div className="settings-section">
              <div className="settings-label">💾 Backup & Restore</div>
              <div style={{background:C.faint,border:`1px solid ${C.border}`,borderRadius:10,padding:16}}>

                {/* Export */}
                <div style={{marginBottom:18}}>
                  <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:6}}>📤 Export Backup</div>
                  <div style={{fontSize:11,color:C.muted,marginBottom:12,lineHeight:1.6}}>
                    Downloads a complete JSON backup of all your data — sections, rooms, loans, contractors, snags, utilities, and everything else.
                  </div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    <B sm onClick={async()=>{
                      try{
                        const ts=new Date().toISOString().slice(0,10);
                        const backup={
                          version:APP_VER,
                          exported_at:new Date().toISOString(),
                          profile_id:profileId,
                          user:session.username,
                          data:{
                            profile,sections,loans,recurring,rooms,
                            smart_devices:smartDevs,amc_items:amcItems,
                            neighbourhood:amenities,contacts,parking:parkingSlots,
                            society_rules:societyRules,documents,key_dates:keyDates,
                            commute_routes:commuteRoutes,room_photos:photos,
                            contractors,snags,payment_milestones:payments,
                            utility_logs:utilityLogs,moodboard,service_logs:serviceLogs,
                            contractor_works:contractorWorks,util_meters:utilMeters,
                            income_logs:incomeLog,
                          }
                        };
                        const blob=new Blob([JSON.stringify(backup,null,2)],{type:"application/json"});
                        const url=URL.createObjectURL(blob);
                        const a=document.createElement("a");
                        a.href=url;
                        a.download=`homeplanner-backup-${ts}.json`;
                        a.click();
                        URL.revokeObjectURL(url);
                        toast("✅ Backup downloaded!");
                      }catch(e){toast("Export failed: "+e.message,"error");}
                    }}>📤 Download Full Backup</B>
                    <B sm v="ghost" onClick={()=>{
                      // Export only current visible data as CSV summary
                      const rows=[["Collection","Count","Last Updated"]];
                      rows.push(["Sections",sections.length,""]);
                      rows.push(["Items",sections.reduce((a,s)=>a+(s.items?.length||0),0),""]);
                      rows.push(["Rooms",rooms.length,""]);
                      rows.push(["Loans",loans.length,""]);
                      rows.push(["Contractors",contractors.length,""]);
                      rows.push(["Snags",snags.length,""]);
                      rows.push(["Payments",payments.length,""]);
                      rows.push(["Utility Logs",utilityLogs.length,""]);
                      rows.push(["Documents",documents.length,""]);
                      const csv=rows.map(r=>r.join(",")).join("\n");
                      const blob=new Blob([csv],{type:"text/csv"});
                      const url=URL.createObjectURL(blob);
                      const a=document.createElement("a");
                      a.href=url;
                      a.download=`homeplanner-summary-${new Date().toISOString().slice(0,10)}.csv`;
                      a.click();
                      URL.revokeObjectURL(url);
                      toast("📊 CSV exported!");
                    }}>📊 Export Summary CSV</B>
                  </div>
                </div>

                <div style={{height:1,background:C.border,marginBottom:18}}/>

                {/* Import / Restore */}
                <div style={{marginBottom:18}}>
                  <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:6}}>📥 Restore from Backup</div>
                  <div style={{fontSize:11,color:C.muted,marginBottom:12,lineHeight:1.6}}>
                    Upload a previously exported JSON backup. This will <strong style={{color:C.orange}}>add to existing data</strong> (not overwrite). Duplicate records may appear — use with caution.
                  </div>
                  <label style={{display:"inline-block",cursor:"pointer"}}>
                    <div style={{background:C.card,border:`2px dashed ${C.border}`,borderRadius:10,padding:"16px 20px",textAlign:"center",cursor:"pointer",transition:"border-color .2s"}}
                      onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor=C.accent;}}
                      onDragLeave={e=>{e.currentTarget.style.borderColor=C.border;}}
                      onDrop={e=>{
                        e.preventDefault();
                        e.currentTarget.style.borderColor=C.border;
                        const file=e.dataTransfer.files[0];
                        if(file) document.getElementById("backup-restore-input").files=e.dataTransfer.files;
                      }}>
                      <div style={{fontSize:28,marginBottom:6}}>📂</div>
                      <div style={{fontSize:12,color:C.text,fontWeight:600}}>Drop backup JSON here</div>
                      <div style={{fontSize:10,color:C.muted,marginTop:2}}>or click to browse</div>
                    </div>
                    <input id="backup-restore-input" type="file" accept=".json" style={{display:"none"}} onChange={async e=>{
                      const file=e.target.files[0];
                      if(!file)return;
                      try{
                        const text=await file.text();
                        const backup=JSON.parse(text);
                        if(!backup.data||!backup.version){toast("Invalid backup file","error");return;}
                        if(!confirm(`Restore backup from ${backup.exported_at?.slice(0,10)||"unknown date"}?\n\nThis will ADD data to your current account. Existing data will NOT be deleted.`)){return;}
                        const d=backup.data;
                        let count=0;
                        const restore=async(collection,items,transform)=>{
                          if(!Array.isArray(items))return;
                          for(const item of items){
                            const body={...item,profile_id:profileId};
                            delete body.id;delete body.created;delete body.updated;delete body.collectionId;delete body.collectionName;
                            if(transform)Object.assign(body,transform(item));
                            await db.post(collection,body).catch(()=>{});
                            count++;
                          }
                        };
                        await restore("sections",d.sections);
                        await restore("loans",d.loans);
                        await restore("recurring",d.recurring);
                        await restore("rooms",d.rooms);
                        await restore("smart_devices",d.smart_devices||d.smartDevs);
                        await restore("amc_items",d.amc_items||d.amcItems);
                        await restore("neighbourhood",d.neighbourhood||d.amenities);
                        await restore("contacts",d.contacts);
                        await restore("parking",d.parking||d.parkingSlots);
                        await restore("society_rules",d.society_rules||d.societyRules);
                        await restore("documents",d.documents);
                        await restore("key_dates",d.key_dates||d.keyDates);
                        await restore("commute_routes",d.commute_routes||d.commuteRoutes);
                        await restore("contractors",d.contractors);
                        await restore("snags",d.snags);
                        await restore("payment_milestones",d.payment_milestones||d.payments);
                        await restore("utility_logs",d.utility_logs||d.utilityLogs);
                        await restore("moodboard",d.moodboard);
                        await restore("service_logs",d.service_logs||d.serviceLogs);
                        await restore("contractor_works",d.contractor_works||d.contractorWorks);
                        await restore("income_logs",d.income_logs||d.incomeLog);
                        toast(`✅ Restored ${count} records! Reloading…`);
                        setTimeout(()=>loadAll(profileId),1500);
                      }catch(err){
                        toast("Restore failed: "+err.message,"error");
                        console.error("Restore error",err);
                      }
                      e.target.value="";
                    }}/>
                  </label>
                </div>

                <div style={{height:1,background:C.border,marginBottom:18}}/>

                {/* Backup status */}
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:10}}>📊 Data Summary</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>

      )}

      {/* Income Modal */}
      {modal==="income"&&(
        <Ml title={editTarget?"Edit Income":"Add Income"} onClose={()=>setModal(null)}>
          <div style={{display:"flex",gap:12}}>
            <Fld label="Source" half><S value={incomef.source} onChange={v=>setIncomef(f=>({...f,source:v}))} opts={["Salary","Rental","Freelance","Business","Investment","Other"]}/></Fld>
            <Fld label="Month *" half><I type="month" value={incomef.month} onChange={v=>setIncomef(f=>({...f,month:v}))}/></Fld>
          </div>
          <Fld label="Amount (₹) *"><I type="number" value={incomef.amount} onChange={v=>setIncomef(f=>({...f,amount:v}))} placeholder="75000"/></Fld>
          <Fld label="Notes"><I value={incomef.notes} onChange={v=>setIncomef(f=>({...f,notes:v}))} placeholder="Bonus, variable pay…"/></Fld>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:8}}><B v="ghost" onClick={()=>setModal(null)}>Cancel</B><B onClick={saveIncome}>{editTarget?"Save":"Add"}</B></div>
        </Ml>
      )}

      {/* Snag Modal */}
      {modal==="snag"&&(
        <Ml title={editTarget?"Edit Snag":"Add Snag"} onClose={()=>setModal(null)}>
          <Fld label="Title *"><I value={snagf.title} onChange={v=>setSnagf(f=>({...f,title:v}))} placeholder="Crack in bedroom wall…"/></Fld>
          <div style={{display:"flex",gap:12}}>
            <Fld label="Location" half><I value={snagf.location} onChange={v=>setSnagf(f=>({...f,location:v}))} placeholder="Master Bedroom"/></Fld>
            <Fld label="Priority" half><S value={snagf.priority} onChange={v=>setSnagf(f=>({...f,priority:v}))} opts={["High","Medium","Low"]}/></Fld>
          </div>
          <div style={{display:"flex",gap:12}}>
            <Fld label="Status" half><S value={snagf.status} onChange={v=>setSnagf(f=>({...f,status:v}))} opts={["Open","In Progress","Fixed"]}/></Fld>
            <Fld label="Assign Contractor" half><S value={snagf.contractor_id} onChange={v=>setSnagf(f=>({...f,contractor_id:v}))} opts={[{v:"",l:"None"},...contractors.map(c=>({v:c.id,l:c.name}))]}/></Fld>
          </div>
          <Fld label="Notes"><I value={snagf.notes} onChange={v=>setSnagf(f=>({...f,notes:v}))} rows={2} placeholder="Details about the defect…"/></Fld>
          <Fld label="Photo URL (optional)"><I value={snagf.photo} onChange={v=>setSnagf(f=>({...f,photo:v}))} placeholder="https://…"/></Fld>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:8}}><B v="ghost" onClick={()=>setModal(null)}>Cancel</B><B onClick={saveSnag}>{editTarget?"Save":"Add Snag"}</B></div>
        </Ml>
      )}

      {/* Payment Milestone Modal */}
      {modal==="payment"&&(
        <Ml title={editTarget?"Edit Payment":"Add Payment Milestone"} onClose={()=>setModal(null)}>
          <Fld label="Label *"><I value={payf.label} onChange={v=>setPayf(f=>({...f,label:v}))} placeholder="Foundation Stage Payment"/></Fld>
          <div style={{display:"flex",gap:12}}>
            <Fld label="Stage" half><S value={payf.stage} onChange={v=>setPayf(f=>({...f,stage:v}))} opts={["Booking","Allotment","Foundation","Slab","Brickwork","Plastering","Flooring","Finishing","Possession","Other"]}/></Fld>
            <Fld label="Amount (₹)" half><I type="number" value={payf.amount} onChange={v=>setPayf(f=>({...f,amount:v}))} placeholder="500000"/></Fld>
          </div>
          <div style={{display:"flex",gap:12}}>
            <Fld label="Due Date" half><I type="date" value={payf.due_date} onChange={v=>setPayf(f=>({...f,due_date:v}))}/></Fld>
            <Fld label="Paid Date" half><I type="date" value={payf.paid_date} onChange={v=>setPayf(f=>({...f,paid_date:v}))}/></Fld>
          </div>
          <Fld label="Notes"><I value={payf.notes} onChange={v=>setPayf(f=>({...f,notes:v}))} rows={2} placeholder="Bank transfer ref, receipt no…"/></Fld>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:8}}><B v="ghost" onClick={()=>setModal(null)}>Cancel</B><B onClick={savePayment}>{editTarget?"Save":"Add"}</B></div>
        </Ml>
      )}

      {/* Utility Modal */}
      {modal==="utility"&&(
        <Ml title={editTarget?"Edit Reading":"Add Utility Reading"} onClose={()=>setModal(null)}>
          <div style={{display:"flex",gap:12}}>
            <Fld label="Type" half><S value={utilf.type} onChange={v=>setUtilf(f=>({...f,type:v}))} opts={["Electricity","Water","Gas","Internet","Other"]}/></Fld>
            <Fld label="Month *" half><I type="month" value={utilf.month} onChange={v=>setUtilf(f=>({...f,month:v}))}/></Fld>
          </div>
          <div style={{display:"flex",gap:12}}>
            <Fld label="Units" half><I type="number" value={utilf.units} onChange={v=>setUtilf(f=>({...f,units:v}))} placeholder="kWh / litres"/></Fld>
            <Fld label="Amount (₹)" half><I type="number" value={utilf.amount} onChange={v=>setUtilf(f=>({...f,amount:v}))} placeholder="1200"/></Fld>
          </div>
          <Fld label="Notes"><I value={utilf.notes} onChange={v=>setUtilf(f=>({...f,notes:v}))} placeholder="Reading date, meter no…"/></Fld>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:8}}><B v="ghost" onClick={()=>setModal(null)}>Cancel</B><B onClick={saveUtil}>{editTarget?"Save":"Add"}</B></div>
        </Ml>
      )}

      {/* Moodboard Modal */}
      {modal==="mood"&&(
        <Ml title={editTarget?"Edit Idea":"Add Moodboard Idea"} onClose={()=>setModal(null)}>
          <div style={{display:"flex",gap:12}}>
            <Fld label="Category" half><S value={moodf.category} onChange={v=>setMoodf(f=>({...f,category:v}))} opts={["Color","Material","Furniture","Lighting","Tiles","Other"]}/></Fld>
            <Fld label="Room" half><S value={moodf.room_id} onChange={v=>setMoodf(f=>({...f,room_id:v}))} opts={[{v:"",l:"General"},...rooms.map(r=>({v:r.id,l:r.name}))]}/></Fld>
          </div>
          <Fld label="Title *"><I value={moodf.title} onChange={v=>setMoodf(f=>({...f,title:v}))} placeholder="Italian Marble, Warm White, Teak Wood…"/></Fld>
          <Fld label="Value (color/url/text)">
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <I value={moodf.value} onChange={v=>setMoodf(f=>({...f,value:v}))} placeholder="#F5F0E8 or image URL or finish name"/>
              {moodf.category==="Color"&&<input type="color" value={moodf.value||"#ffffff"} onChange={e=>setMoodf(f=>({...f,value:e.target.value}))} style={{width:40,height:40,borderRadius:6,border:"none",cursor:"pointer"}}/>}
            </div>
          </Fld>
          <Fld label="Notes"><I value={moodf.notes} onChange={v=>setMoodf(f=>({...f,notes:v}))} placeholder="Vendor, reference, price range…"/></Fld>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:8}}><B v="ghost" onClick={()=>setModal(null)}>Cancel</B><B onClick={saveMood}>{editTarget?"Save":"Add"}</B></div>
        </Ml>
      )}

      {/* Contractor Modal */}
      {modal==="contractor"&&(
        <Ml title={editTarget?"Edit Contractor":"Add Contractor"} onClose={()=>setModal(null)}>
          <div style={{display:"flex",gap:12}}>
            <Fld label="Name *" half><I value={contractorf.name} onChange={v=>setContractorf(f=>({...f,name:v}))} placeholder="Ramesh Electricals"/></Fld>
            <Fld label="Trade" half><S value={contractorf.trade} onChange={v=>setContractorf(f=>({...f,trade:v}))} opts={["Plumber","Electrician","Carpenter","Painter","Tiles","Civil","AC","CCTV","Interior","Other"]}/></Fld>
          </div>
          <div style={{display:"flex",gap:12}}>
            <Fld label="Phone" half><I value={contractorf.phone} onChange={v=>setContractorf(f=>({...f,phone:v}))} placeholder="9876543210" type="tel"/></Fld>
            <Fld label="Rating (1-5)" half><S value={contractorf.rating} onChange={v=>setContractorf(f=>({...f,rating:Number(v)}))} opts={[1,2,3,4,5].map(n=>({v:n,l:"★".repeat(n)+" ("+n+")"}))}/></Fld>
          </div>
          <div style={{display:"flex",gap:12}}>
            <Fld label="Last Called" half><I value={contractorf.last_called} onChange={v=>setContractorf(f=>({...f,last_called:v}))} type="date"/></Fld>
            <Fld label="Status" half><S value={contractorf.status} onChange={v=>setContractorf(f=>({...f,status:v}))} opts={["Active","Inactive","Blacklisted"]}/></Fld>
          </div>
          <Fld label="Notes"><I value={contractorf.notes} onChange={v=>setContractorf(f=>({...f,notes:v}))} placeholder="Good work, punctual…" rows={2}/></Fld>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:8}}>
            <B v="ghost" onClick={()=>setModal(null)}>Cancel</B>
            <B onClick={saveContractor}>{editTarget?"Save":"Add Contractor"}</B>
          </div>
        </Ml>
      )}

      {/* Floor Plan Room Modal */}
      {modal==="floorroom"&&(
        <Ml title="Add Room to Floor Plan" onClose={()=>setModal(null)}>
          <Fld label="Room Name *"><I value={floorRoomf.name} onChange={v=>setFloorRoomf(f=>({...f,name:v}))} placeholder="Living Room, Kitchen…"/></Fld>
          <div style={{display:"flex",gap:12}}>
            <Fld label="Color" half>
              <input type="color" value={floorRoomf.color} onChange={e=>setFloorRoomf(f=>({...f,color:e.target.value}))} style={{width:"100%",height:40,borderRadius:8,border:"none",cursor:"pointer",background:"none"}}/>
            </Fld>
            <Fld label="Width (cols)" half><I value={floorRoomf.w} onChange={v=>setFloorRoomf(f=>({...f,w:Math.max(1,Number(v))}))} type="number" placeholder="3"/></Fld>
          </div>
          <div style={{display:"flex",gap:12}}>
            <Fld label="Height (rows)" half><I value={floorRoomf.h} onChange={v=>setFloorRoomf(f=>({...f,h:Math.max(1,Number(v))}))} type="number" placeholder="2"/></Fld>
            <Fld label="Start X" half><I value={floorRoomf.x} onChange={v=>setFloorRoomf(f=>({...f,x:Math.max(1,Number(v))}))} type="number" placeholder="1"/></Fld>
          </div>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:8}}>
            <B v="ghost" onClick={()=>setModal(null)}>Cancel</B>
            <B onClick={addFloorRoom}>Add to Plan</B>
          </div>
        </Ml>
      )}

      {photoViewer&&(
        <div style={{position:"fixed",inset:0,background:"#000e",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setPhotoViewer(null)}>
          <div style={{position:"relative",maxWidth:"95vw",maxHeight:"90vh"}}>
            <img src={photoViewer} style={{maxWidth:"95vw",maxHeight:"85vh",objectFit:"contain",borderRadius:10}} alt="full size"/>
            <button onClick={()=>setPhotoViewer(null)} style={{position:"absolute",top:-12,right:-12,background:C.red,border:"none",borderRadius:"50%",width:32,height:32,cursor:"pointer",fontSize:16,color:"white",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
          </div>
        </div>
      )}

    </div>
  );
}

// ═══════════════════════════════════════════════
// ROOT CONTROLLER
// ═══════════════════════════════════════════════
function Root(){
  const [setup,setSetup]=useState(null);   // null = not loaded yet
  const [session,setSession]=useState(null);
  const [db,setDb]=useState(null);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    // Use saved setup or fall back to embedded defaults
    const saved=LS.get(CK.setup)||{url:DEFAULT_SB_URL,anonKey:DEFAULT_ANON_KEY};
    const sess=LS.get(CK.session);
    // Always save defaults if not already saved
    if(!LS.get(CK.setup)){
      LS.set(CK.setup,{url:DEFAULT_SB_URL,anonKey:DEFAULT_ANON_KEY});
    }
    setSetup(saved);
    const d=mkDB(saved.url,saved.anonKey||DEFAULT_ANON_KEY,sess?.token||"");
    setDb(d);
    if(sess) setSession(sess);
    setLoading(false);
  },[]);

  const handleSetupDone=({url,anonKey})=>{
    const d=mkDB(url,anonKey);
    setDb(d);
    setSetup({url,anonKey});
  };

  const handleLogin=sess=>{setSession(sess);};

  const handleLogout=()=>{
    LS.del(CK.session);
    setSession(null);
  };

  if(loading) return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",background:"#06080e",color:"#405570",fontSize:13}}>
      <span className="spinner spin" style={{width:24,height:24,borderColor:"#182030",borderTopColor:"#38bdf8",marginRight:10}}/>
      Loading…
    </div>
  );

  if(!setup) return <SetupScreen onDone={handleSetupDone}/>;
  if(!session) return <AuthScreen db={db} onLogin={handleLogin}/>;
  return <MainApp db={db} session={session} onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
